name: Release PDF

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.14.2

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto fonts-firacode fonts-stix

      - name: Compile TFE
        run: typst compile main.typ TFE.pdf

      - uses: actions/upload-artifact@v7
        with:
          name: TFE
          path: TFE.pdf

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: TFE.pdf
          generate_release_notes: true
