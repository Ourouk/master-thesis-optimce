name: Build and Release PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        run: docker run --rm -v "${{ github.workspace }}:/data" pandoc/typst:latest-ubuntu typst compile /data/main.typ /data/TFE.pdf

      - name: Upload PDF
        uses: softprops/action-gh-release@v3
        with:
          files: TFE.pdf
          generate_release_notes: true