name: Build and Release PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: docker://pandoc/typst:latest-ubuntu
        with:
          args: --output=TFE.pdf main.typ

      - name: Upload PDF
        uses: softprops/action-gh-release@v3
        with:
          files: TFE.pdf
          generate_release_notes: true