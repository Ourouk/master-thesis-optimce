name: Build and Release PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Typst
        run: |
          curl -sL https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.gz | tar xz
          echo "$GITHUB_WORKSPACE/typst-x86_64-unknown-linux-musl" >> $GITHUB_PATH

      - name: Build PDF
        run: typst compile main.typ TFE.pdf

      - name: Upload PDF
        uses: softprops/action-gh-release@v3
        with:
          files: TFE.pdf
          generate_release_notes: true